[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [
    ".venv",
    "LLM_Redial",
    "chroma_db",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long — handled by formatter where it matters
    "B008",  # function calls in argument defaults — fine for FastAPI Depends
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F401", "F811"]  # test fixtures and re-imports are common
"eda.ipynb" = ["F401", "F811", "F541", "E402", "B007"]  # exploratory notebook, looser rules

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-q"
